                                fi
                              fi
                            else
                              echo "ERROR: DP Gateway TLS Server Profile is not available in your APIC stack. Check your environment and try again."
                            fi
                          fi
                        else
                          echo "ERROR: DP Gateway TLS Client Profile is not available in your APIC stack. Check your environment and try again."
