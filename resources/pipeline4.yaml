                      oc create secret generic porg-lur-users-info -n $NS_NAME --from-file=porg-lur-users-config.json=temp-porg-lur-users-info.json
                    else
                      echo $CONFIG_DATA | base64 -d > template-jgr-apicv12-users.json
                      jq --arg user_name $USER_NAME --arg user_pwd $USER_PWD '.users += [{"userId": $user_name, "password": $user_pwd}]' template-jgr-apicv12-users.json > temp-porg-lur-users-info.json
                      rm -f template-jgr-apicv12-users.json
                      oc delete secret porg-lur-users-info -n $NS_NAME
                      oc create secret generic porg-lur-users-info -n $NS_NAME --from-file=porg-lur-users-config.json=temp-porg-lur-users-info.json
                    fi
                    rm -f temp-porg-lur-users-info.json
                    echo "Password for $USER_NAME is: $USER_PWD"
                  fi
                else
                  echo "User $USER_NAME already exists."
                  CONFIG_DATA=$(oc get secret porg-lur-users-info -n $NS_NAME --ignore-not-found -o jsonpath='{.data.porg-lur-users-config\.json}')
                  if [ ! -z "$CONFIG_DATA" ]; then
                    echo $CONFIG_DATA | base64 -d > temp-porg-lur-users-info.json
                    PORG_USER_ID=$(jq --arg user_name $USER_NAME '.users | .[] | select(.userId == $user_name).userId' temp-porg-lur-users-info.json)
                    if [ -z "$PORG_USER_ID" ]; then
                      echo "WARNING: User was created manually. POrg won't be configured with scripts."
                    else
                      PORG_USER_PWD=$(jq -r --arg user_name $USER_NAME '.users | .[] | select(.userId == $user_name).password' temp-porg-lur-users-info.json)
                      if [ ! -z "$PORG_USER_PWD" ]; then
                        echo "Password for $USER_NAME is: $PORG_USER_PWD"
                      else
                        echo "ERROR: Password is empty. Check if config secret has been modified."
                      fi
                    fi
                    rm -f temp-porg-lur-users-info.json
                  else
                    echo "WARNING: User was created manually. POrg won't be configured with scripts."
                  fi
                fi
              fi
              if [ ! -z "$USER_URL" ]; then
                echo "Getting Provider Organizations..."
                RESP_CODE=$(curl -X GET -s -k \
                  --dump-header apic-api-header \
                  -H 'Accept: application/json' \
                  -H "Authorization: Bearer $API_TOKEN" \
                  --output apic-response-data.json \
                  --write-out '%{response_code}' \
                  $APIC_MGMT_SERVER_URL/api/cloud/orgs)
                if [[ "${RESP_CODE}" != "200" ]]; then
                  if [[ "${RESP_CODE}" == "401" ]]; then
                    echo "APIC Credentials are not valid. Check the values and correct them."
                  else
                    echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                    echo "Check API Manager is up and running and properly configured."
                  fi
                else
                  echo "Validating If Provider Organization Exists..."
                  PORG_URL=$(jq -r --arg obj_name $PORG_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                  if [ -z "$PORG_URL" ]; then
                    echo "Creating Provider Organization Definition..."
                    ( echo "cat <<EOF" ; cat templates/template-apic-provider-org.json ;) | \
                      PORG_NAME=${PORG_NAME} \
                      PORG_TITLE=${PORG_TITLE} \
                      USER_URL=${USER_URL} \
                      sh > apic-provider-org.json
                    echo "Creating Provider Organization..."
                    RESP_CODE=$(curl -X POST -s -k \
                      --dump-header apic-api-header \
                      -H 'Accept: application/json' \
                      -H 'Content-Type: application/json' \
                      -H "Authorization: Bearer $API_TOKEN" \
                      --data @apic-provider-org.json \
                      --output apic-response-data.json \
                      --write-out '%{response_code}' \
                      $APIC_MGMT_SERVER_URL/api/cloud/orgs)
                    if [[ "${RESP_CODE}" != "201" ]]; then
                      if [[ "${RESP_CODE}" == "401" ]]; then
                        echo "APIC Credentials are not valid. Check the values and correct them."
                      else
                        echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                        echo "Check API Manager is up and running and properly configured."
                      fi
                    else
                      echo "Provider Organization $PORG_NAME has been created."
                      oc get secret porg-lur-users-info -n $NS_NAME -o jsonpath='{.data.porg-lur-users-config\.json}' | base64 -d > temp-porg-lur-users-info.json
                      jq --arg user_name $USER_NAME --arg porg_name $PORG_NAME '.users |= map(if .userId == $user_name then .porgName |= (. // [] ) + [$porg_name] else . end)' temp-porg-lur-users-info.json > new-porg-lur-users-info.json
                      rm -f temp-porg-lur-users-info.json
                      oc delete secret porg-lur-users-info -n $NS_NAME
                      oc create secret generic porg-lur-users-info -n $NS_NAME --from-file=porg-lur-users-config.json=new-porg-lur-users-info.json
                      rm -f new-porg-lur-users-info.json
                    fi
                  else
                    echo "Provider Organization $PORG_NAME already exists."
                  fi
                fi
              else
                echo "Can not create Provider Organization, User $USER_NAME not available."
              fi
            fi

            echo "Cleaning up temp files..."
            
            rm -f apic-login.json

            rm -f apic-user.json
                
            rm -f apic-provider-org.json

            rm -f apic-api-header

            rm -f apic-response-data.json
