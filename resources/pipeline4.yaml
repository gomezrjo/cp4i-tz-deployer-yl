            echo "Creating Nano Gateway instance..."
            
            oc apply -f apic-nano-gwy-instance.yaml -n ${NS_NAME}

            echo "Cleaning up temp file..."
            
            rm -f apic-nano-gwy-instance.yaml

            echo "Waiting for apic dp nano gateway instance to be ready..."

            while ! oc wait --for=condition=Ready
            nanogatewaycluster/$INST_NAME -n
