apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: apic-v12-demo
  namespace: default
spec:
  workspaces:
    - name: cp4i-ws
  finally:
    - name: output-usage
      params:
        - name: SCRIPT
          value: >-
            cd workspace/cp4i-ws/cp4i-deployer-helper

            INST_NAME="management"

            NS_NAME="tools"

            APIC_ADMIN_PWD=''

            A7S_INST_NAME="analytics"

            DP_API_GW_INST_NAME="gwv6"

            DP_V5_GW_INST_NAME="gwv5"

            DP_NANO_GW_INST_NAME="ngw"

            WM_API_GW_INST_NAME="wmapigateway"

            CMS_DEV_PORTAL_INST_NAME="portal"

            WM_DEV_PORTAL_INST_NAME=" wm-devportal"

            FAM_INST_NAME="fam"

            oc delete configmap/pipeline-apicv12-demo-output -n default --ignore-not-found=true 

            oc delete configmap/pipeline-mailpit-demo-output -n default --ignore-not-found=true 
            
            if [[ "$(params.CP4I_VERSION)" == "CD" ]]; then
              if [[ "$(tasks.setup-workspace.results.output)" == "true" ]]; then
                echo "Getting API Manager instance $INST_NAME access info to CMC..."
                CMC_URL="https://$(oc get route ${INST_NAME}-admin -n $NS_NAME -o jsonpath='{.spec.host}')"
                CMC_ADMIN_PWD=$(oc get secret ${INST_NAME}-admin-secret -n $NS_NAME -o jsonpath={.data.password} | base64 -d)
                CMC_NEW_ADMIN_PWD=$(oc get secret ${INST_NAME}-admin-new-pwd -n $NS_NAME --ignore-not-found -o jsonpath={.data.password} | base64 -d)
                if [ -z "$CMC_NEW_ADMIN_PWD" ]; then
                  if [ ! -z "$APIC_ADMIN_PWD" ]; then
                    oc create secret generic ${INST_NAME}-admin-new-pwd -n $NS_NAME --from-literal=password=$APIC_ADMIN_PWD
                  fi
                else
                  if [ "$CMC_NEW_ADMIN_PWD" != "$APIC_ADMIN_PWD" ]; then
                    echo "Using stored password for CMC Admin user..."
                  fi
                  APIC_ADMIN_PWD=$CMC_NEW_ADMIN_PWD
                fi
                echo "Getting API Manager instance $INST_NAME access info..."
                API_MANAGER_URL="https://$(oc get route ${INST_NAME}-api-manager -n $NS_NAME -o jsonpath='{.spec.host}')"
                echo "Getting Analytics instance $A7S_INST_NAME endpoint..."
                A7S_AI_URL="https://$(oc get route ${A7S_INST_NAME}-ai-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo "Getting DP API Gateway instance $DP_API_GW_INST_NAME endpoints..."
                DP_API_GW_MGMT_URL="https://$(oc get route ${DP_API_GW_INST_NAME}-gateway-manager -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                DP_API_GW_URL="https://$(oc get route ${DP_API_GW_INST_NAME}-gateway -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo "Getting DP v5 Gateway instance $DP_V5_GW_INST_NAME endpoints..."
                DP_V5_GW_MGMT_URL="https://$(oc get route ${DP_V5_GW_INST_NAME}-gateway-manager -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                DP_V5_GW_URL="https://$(oc get route ${DP_V5_GW_INST_NAME}-gateway -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo "Getting DP Nano Gateway instance $DP_NANO_GW_INST_NAME endpoints..."
                DP_NANO_GW_MGMT_URL="https://$(oc get route ${DP_NANO_GW_INST_NAME}-mgmt-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                DP_NANO_GW_URL="https://$(oc get route ${DP_NANO_GW_INST_NAME}-nanogw -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo "Getting wM API Gateway instance $WM_API_GW_INST_NAME endpoints..."
                WM_API_GW_MGMT_URL="https://$(oc get route ${WM_API_GW_INST_NAME}-mgmt-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                WM_API_GW_URL="https://$(oc get route ${WM_API_GW_INST_NAME}-gateway-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                WM_API_GW_UI_URL="https://$(oc get route ${WM_API_GW_INST_NAME}-ui-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                WM_API_GW_ADMIN_PWD=$(oc get secret ${WM_API_GW_INST_NAME}-admin-secret -n $NS_NAME --ignore-not-found -o jsonpath={.data.password} | base64 -d)
                echo "Getting CMS Dev Portal instance $CMS_DEV_PORTAL_INST_NAME endpoints..."
                CMS_DEV_PORTAL_MGMT_URL="https://$(oc get route ${CMS_DEV_PORTAL_INST_NAME}-portal-director -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                CMS_DEV_PORTAL_WEB_URL="https://$(oc get route ${CMS_DEV_PORTAL_INST_NAME}-portal-web -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo "Getting wM Dev Portal instance $WM_DEV_PORTAL_INST_NAME endpoints..."
                WM_DEV_PORTAL_MGMT_URL="https://$(oc get route ${WM_DEV_PORTAL_INST_NAME}-devportal-admin -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                WM_DEV_PORTAL_WEB_URL="https://$(oc get route ${WM_DEV_PORTAL_INST_NAME}-devportal-web -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                WM_DEV_PORTAL_ADMIN_PWD=$(oc get secret ${WM_DEV_PORTAL_INST_NAME}-admin-secret -n $NS_NAME --ignore-not-found -o jsonpath={.data.password} | base64 -d)
                echo "Getting Federated API Management instance $FAM_INST_NAME endpoints..."
                FAM_MGMT_URL="https://$(oc get route ${FAM_INST_NAME}-admin-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                FAM_UI_URL="https://$(oc get route ${FAM_INST_NAME}-ui-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                echo
                echo "APIC access and config info:"
                echo "APIC Cloud Manager." 
                echo "   UI URL: $CMC_URL" 
                echo "   Admin user: admin"
                echo "   Admin temp password: $CMC_ADMIN_PWD"
                if [ ! -z "$APIC_ADMIN_PWD" ]; then
                  echo "   Admin password: $APIC_ADMIN_PWD"
                fi
                echo "=========="
                echo "APIC API Manager."
                echo "   UI URL: $API_MANAGER_URL"
                CONFIG_DATA=$(oc get secret porg-lur-users-info -n $NS_NAME --ignore-not-found -o jsonpath='{.data.porg-lur-users-config\.json}')
                if [ ! -z "$CONFIG_DATA" ]; then
                  echo $CONFIG_DATA | base64 -d > temp-porg-lur-users-info.json
                  NUM_USERS=$(jq '.users | length' temp-porg-lur-users-info.json)
                  for USER_IND in $(seq 1 $NUM_USERS); do
                    PORG_USER_ID=$(jq --argjson i $((USER_IND - 1)) -r '.users[$i].userId' temp-porg-lur-users-info.json)
                    PORG_USER_PWD=$(jq --argjson i $((USER_IND - 1)) -r '.users[$i].password' temp-porg-lur-users-info.json)
                    echo "   User $USER_IND:"
                    echo "     Id: $PORG_USER_ID"
                    echo "     Password: $PORG_USER_PWD"
                  done
                    rm -f temp-porg-lur-users-info.json 
                fi
                echo "=========="
                if [[ $A7S_AI_URL != "https://" ]]; then
                  echo "Analytics."
                  echo "   Ingestion endpoint: $A7S_AI_URL"
                  echo "=========="
                else
                  echo "Analytics Sub-system $A7S_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $DP_API_GW_MGMT_URL != "https://" ]]; then
                  echo "DP API Gateway."
                  echo "   Management endpoint: $DP_API_GW_MGMT_URL"
                  echo "   API endpoint: $DP_API_GW_URL"
                  echo "=========="
                else
                  echo "DP API Gateway sub-system $DP_API_GW_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $DP_V5_GW_MGMT_URL != "https://" ]]; then
                  echo "DP v5 Gateway." 
                  echo "   Management endpoint: $DP_V5_GW_MGMT_URL"
                  echo "   API endpoint: $DP_V5_GW_URL"
                  echo "=========="
                else
                  echo "DP v5 Gateway sub-system $DP_V5_GW_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $DP_NANO_GW_MGMT_URL != "https://" ]]; then
                  DP_NANO_GW_URL="${DP_NANO_GW_URL/wildcard/*}"
                  echo "DP Nano Gateway."
                  echo "   Management endpoint: $DP_NANO_GW_MGMT_URL"
                  echo "   API endpoint: $DP_NANO_GW_URL"
                  echo "=========="
                else
                  echo "DP Nano Gateway sub-system $DP_NANO_GW_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $WM_API_GW_MGMT_URL != "https://" ]]; then
                  echo "wM API Gateway."
                  echo "   Management endpoint: $WM_API_GW_MGMT_URL"
                  echo "   API endpoint: $WM_API_GW_URL"
                  echo "   UI endpoint: $WM_API_GW_UI_URL"
                  echo "   Admin user: Administrator"
                  echo "   Admin password: $WM_API_GW_ADMIN_PWD"
                  echo "=========="
                else
                  echo "wM API Gateway sub-system $WM_API_GW_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $CMS_DEV_PORTAL_MGMT_URL != "https://" ]]; then
                  echo "CMS Developer Portal."
                  echo "   Management endpoint: $CMS_DEV_PORTAL_MGMT_URL"
                  echo "   Website endpoint: $CMS_DEV_PORTAL_WEB_URL"
                  echo "=========="
                else
                  echo "CMS Developer Portal sub-system $CMS_DEV_PORTAL_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $WM_DEV_PORTAL_MGMT_URL != "https://" ]]; then
                  echo "wM Developer Portal."
                  echo "   Management endpoint: $WM_DEV_PORTAL_MGMT_URL"
                  echo "   Website endpoint: $WM_DEV_PORTAL_WEB_URL"
                  echo "   Admin user: Administrator"
                  echo "   Admin password: $WM_DEV_PORTAL_ADMIN_PWD"
                  echo "=========="
                else
                  echo "wM Developer Portal sub-system $WM_DEV_PORTAL_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                if [[ $FAM_MGMT_URL != "https://" ]]; then
                  echo "Federated API Management."
                  echo "   Management endpoint: $FAM_MGMT_URL"
                  echo "   UI endpoint: $FAM_UI_URL"
                  echo "   Admin user: Administrator"
                  echo "   Admin password: manage"
                  echo "=========="
                else
                  echo "Federated API Management sub-system $FAM_INST_NAME in namespace $NS_NAME is not available."
                  echo "=========="
                fi
                oc create configmap pipeline-apicv12-demo-output -n default \
                  --from-literal=msg="Pipeline APICv12 Demo finished."

                MAILPIT_URL="http://"$(oc get route mailpit-ui -n mailpit -o jsonpath='{.status.ingress[0].host}')
                echo "----------------------------"
                echo "MailPit access information..."
                echo "   UI URL: " $MAILPIT_URL
                echo "   Admin user:  mailpit-admin" 
                echo "   Admin password: " $(oc get secret jgr-mailpit -n default -o jsonpath='{.data.password}' | base64 -d)
                echo "----------------------------"       
                oc create configmap pipeline-mailpit-demo-output -n default \
                  --from-literal=msg="Pipeline APICv12 Demo run completed" \
                  --from-literal=mailpit-ui-url="$MAILPIT_URL" \
                  --from-literal=mailpit-admin-username=mailpit-admin \
                  --from-literal=mailpit-admin-password="$(oc get secret jgr-mailpit -n default -o jsonpath='{.data.password}' | base64 -d)"
              else
                echo "----------------------------"
                echo "Pipeline APICv12 Demo couldn't run successfully."              
                echo "Check the logs in setup-workspace task for more details."
                echo "----------------------------"
                oc create configmap pipeline-apicv12-demo-output -n default \
                  --from-literal=msg="Pipeline APICv12 Demo couldn't run. Check the logs in setup-workspace task for more details."
              fi
            else
              echo "----------------------------"
              echo "Pipeline APICv12 Demo didn't run. The version provided is not valid."              
              echo "Supported version is CD. Correct parameter CP4I_VERSION and try again."
              echo "----------------------------"
              oc create configmap pipeline-apicv12-demo-output -n default \
                --from-literal=msg="Pipeline APICv12 Demo didn't run. The value provided in parameter CP4I_VERSION is not valid."
            fi
        - name: VERSION
          value: latest
      taskRef:
        kind: Task
        name: jgr-task-0.2
      workspaces:
        - name: cp4i-ws
  params:
    - name: APIC_NAMESPACE
      default: tools
      description: Namespace to deploy Platform UI
      type: string
    - name: CP4I_VERSION
      default: CD
      description: Version of CP4I Platform UI to deploy
      type: string
    - name: DEFAULT_SC
      default: ocs-external-storagecluster-ceph-rbd
      description: Default Storage Class for Cluster
      type: string
    - name: OCP_BLOCK_STORAGE
      default: ocs-external-storagecluster-ceph-rbd
      description: Block Storage Class for Cluster
      type: string
    - name: OCP_FILE_STORAGE
      default: ocs-external-storagecluster-cephfs
      description: File Storage Class for Cluster
      type: string
    - name: DEPLOY_DATAPOWER_GATEWAY_OPERATOR
      default: 'true'
      description: Deploy DataPower Gateway operator
      type: string
    - name: DEPLOY_API_CONNECT_OPERATOR
      default: 'true'
      description: Deploy API Connect operator
      type: string
    - name: IBM_ENTITLEMENT_KEY_ID
      default: a65ac528-bbca-1425-8d07-fde9e2f1ff70
      type: string
    - name: DEPLOY_API_CONNECT
      default: 'true'
      description: Deploy apiconnect
      type: string
    - name: DEPLOY_APIC_V12
      default: 'true'
      description: Deploy apiconnect
      type: string
    - name: PORG_OWNER_ID
      default: 'shavon'
      description: Provider Organization owner Id
      type: string
    - name: PORG_OWNER_FNAME
      default: 'Shavon'
      description: Provider Organization owner first name
      type: string
    - name: PORG_OWNER_LNAME
      default: 'wM-Apic'
      description: Provider Organization owner last name
      type: string
    - name: PORG_OWNER_EMAIL
      default: 'shavon@apiconnect.net'
      description: Provider Organization owner last name
      type: string
    - name: TZ_ENV_TYPE
      default: 'full'
      description: Environment type used to deploy CP4I stack (full, apic, ea, ace_mq)
      type: string
    - name: IBM_SECRETS_MANAGER_ENDPOINT
      default: >-
        https://afa20521-cd75-4864-843f-e59fd0ffd49d.us-south.secrets-manager.appdomain.cloud
      type: string
    - name: COPY_TLS_CERTS
      default: 'true'
      type: string
  tasks:
    - name: setup-workspace
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            REPO_SIGNATURE="JGR-20260720-001"

            echo "Setting up workspace for pipeline"

            cd workspace/cp4i-ws

            git clone --single-branch --branch main https://github.com/gomezrjo/cp4i-deployer-helper.git

            echo "Checking helper repo."

            if grep -q "${REPO_SIGNATURE}" cp4i-deployer-helper/signature; then
                echo "Valid signature in helper repo."
            else
                echo "Helper repo is out of sync, update this repo in your workstation."
                echo "Once updated locally re-apply the pipeline to your cluster before running the pipeline again."
                printf false | tee $(results.output.path)
                exit 0
            fi

            echo "Checking SC provided in parameter DEFAULT_SC"
            
            SC_EXIST=$(oc get sc --no-headers | awk -v sc_name=$(params.DEFAULT_SC) '$1 == sc_name {print "yes"}')
            
            if [[ -z $SC_EXIST ]]; then 
                echo "SC does NOT exist"
                printf false | tee $(results.output.path)
                exit 0
            else 
                echo "SC found"
            fi

            echo "Checking SC provided in parameter OCP_BLOCK_STORAGE"
            
            SC_EXIST=$(oc get sc --no-headers | awk -v sc_name=$(params.OCP_BLOCK_STORAGE) '$1 == sc_name {print "yes"}')

            if [[ -z $SC_EXIST ]]; then 
                echo "SC does NOT exist"
                printf false | tee $(results.output.path)
                exit 0
            else 
                echo "SC found"
            fi

            echo "Checking SC provided in parameter OCP_FILE_STORAGE"
            
            SC_EXIST=$(oc get sc --no-headers | awk -v sc_name=$(params.OCP_FILE_STORAGE) '$1 == sc_name {print "yes"}')

            if [[ -z $SC_EXIST ]]; then 
                echo "SC does NOT exist"
                printf false | tee $(results.output.path)
                exit 0
            else 
                echo "SC found"
            fi

            printf true | tee $(results.output.path)

            case "$(params.CP4I_VERSION)" in

                "SC2")
            
                    tar -xvzf cp4i-deployer-helper/extras/toolkit-linux-10.0.8.8.tgz
            
                    ;;
            
                "CD")
                    
                    tar -xvzf cp4i-deployer-helper/extras/toolkit-linux-10.0.11.0.tgz
                    
                    ;;
            
            esac

            chmod +x apic

            echo "Workspace for pipeline is ready"
        - name: VERSION
          value: latest
      retries: 3
      taskRef:
        kind: Task
        name: jgr-task-0.2
      workspaces:
        - name: cp4i-ws
    - name: set-default-storage-class
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            echo "Setting default storage class"
            
            cd workspace/cp4i-ws/cp4i-deployer-helper
                        
            if [[ $(oc get sc | grep default | wc -l) -gt 0 ]]; then
                oc get sc | grep default | awk '{system("oc patch storageclass " $1 " --patch-file resources/99-sc-remove-default.yaml")}'          
            fi
            
            oc patch storageclass $(params.DEFAULT_SC) --patch-file resources/99-sc-set-default.yaml
        - name: VERSION
          value: latest
      retries: 3
      runAfter:
        - setup-workspace
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["SC2", "CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: mail-server-deployment
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            oc delete secret/jgr-mailpit -n default --ignore-not-found=true

            echo "Creating namespace for mail server"
            
            if [[ -z "$(oc projects -q | awk '$1=="mailpit" {print $1}')" ]]; then
                oc new-project mailpit
            else
                echo "Namespace mailpit already exists."
            fi 

            MYSTR=$(oc get deployment mailpit -n mailpit --ignore-not-found -o jsonpath='{.spec.template.spec.containers[0].env[2].value}')

            if [ "$(oc get deployment mailpit -n mailpit --ignore-not-found -o jsonpath='{.status.conditions[0].status}')" == "True" ]; then
                echo "Mailpit is already deployed..."
                echo "Getting existing mailpit-admin password..."
                MAILPIT_ADMIN_PWD="${MYSTR##*:}"
            else
                if [ ! -z "$MYSTR" ]; then
                    echo "Getting existing mailpit-admin password..."
                    MAILPIT_ADMIN_PWD="${MYSTR##*:}"
                else
                    echo "Generating mailpit-admin password"
                    MAILPIT_ADMIN_PWD=$(uuidgen | tr '[:upper:]' '[:lower:]' | tr -d '-')
                fi

                echo "Preparing mail server deployment manifest"
                ( echo "cat <<EOF" ; cat resources/30a-mailpit-deployment.yaml ;) | \
                    MAILPIT_ADMIN_PWD=${MAILPIT_ADMIN_PWD} \
                    sh > mailpit-deployment.yaml

                echo "Deploying mailtraip server"
                oc apply -f mailpit-deployment.yaml

                echo "Waiting for mail server to be ready..."
                while ! oc wait --for=jsonpath='{.status.conditions[0].status}'=True \
                    deployment/mailpit -n mailpit 2>/dev/null; do sleep 10; done
            fi

            echo "Creating mail server service" 

            oc apply -f resources/30b-mailpit-services.yaml

            echo "Creating mail server route"

            oc apply -f resources/30c-mailpit-route.yaml 

            oc create secret generic jgr-mailpit -n default --from-literal=username="mailpit-admin" --from-literal=password="${MAILPIT_ADMIN_PWD}" 

            echo "Mail server is ready"
        - name: VERSION
          value: latest
      runAfter:
        - set-default-storage-class
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["SC2", "CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: cert-mgr-operator-installation
      params:
        - name: SCRIPT
          value: |-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            echo "Creating a new namespace called cert-manager-operator"

            if [[ $(oc get projects | grep cert-manager-operator | wc -l) -eq 0 ]]; then
                oc apply -f resources/00-cert-manager-namespace.yaml
            fi 

            echo "Creating operator group for cert-manager-operator namespace"

            oc apply -f resources/00-cert-manager-operatorgroup.yaml
            
            echo "Creating subscription for cert-manager-operator"
            
            oc apply -f resources/00-cert-manager-subscription.yaml

            echo "Getting operator version..."
            
            SUB_NAME=''
            
            while [ -z "$SUB_NAME" ]; do sleep 5; SUB_NAME=$(oc get deployment cert-manager-operator-controller-manager -n cert-manager-operator --ignore-not-found -o jsonpath='{.metadata.labels.olm\.owner}'); done

            echo "Waiting for cert manager operator to be ready..."

            while ! oc wait --for=jsonpath='{.status.phase}'=Succeeded csv/$SUB_NAME -n cert-manager-operator 2>/dev/null; do sleep 30; done

            echo "Cert manager operator is ready."
        - name: VERSION
          value: latest
      runAfter:
        - mail-server-deployment
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["SC2", "CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: create-cp4i-base-namespaces
      params:
        - name: SCRIPT
          value: |-
            set -o xtrace

            CP4I_NAMESPACES=($(params.APIC_NAMESPACE))

            for NS in "${CP4I_NAMESPACES[@]}"

            do
            
                echo "Creating a new namespace called" $NS

                if [[ -z "$(oc projects -q | awk -v ns=$NS '$1 == ns {print $1}')" ]]; then
                    oc new-project $NS
                else
                    echo "Namespace" $NS "already exists."
                fi 

            done

            echo "Namespaces are ready"            
        - name: VERSION
          value: latest
      runAfter:
        - cert-mgr-operator-installation
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["SC2", "CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
    - name: get-entitlement-key
      params:
        - name: KEY_ID
          value: $(params.IBM_ENTITLEMENT_KEY_ID)
        - name: SECRETS_MANAGER_ENDPOINT_URL
          value: $(params.IBM_SECRETS_MANAGER_ENDPOINT)
      runAfter:
        - create-cp4i-base-namespaces
      taskRef:
        kind: Task
        name: ibmcloud-secrets-manager-get
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["SC2", "CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
    - name: create-ibm-entitlement-key
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            CP4I_NAMESPACES=($(params.APIC_NAMESPACE))

            for NS in "${CP4I_NAMESPACES[@]}"

            do

                if oc get secret ibm-entitlement-key -n $NS >/dev/null 2>&1; then
                    username=$(oc get secret ibm-entitlement-key -n $NS -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | jq -r '.auths."cp.icr.io".username')
                    password=$(oc get secret ibm-entitlement-key -n $NS -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | jq -r '.auths."cp.icr.io".password')

                    if [[ "$username" == "cp" ]] && [[ "$password" == "$(tasks.get-entitlement-key.results.secret-value)" ]]; then
                        echo "Secret ibm-entitlement-key was already created. Skipping secret creation"
                        exit 0
                    else
                        echo "Existing ibm-entitlement-key password does not match retrieved key. Deleting..."
                        oc delete secret ibm-entitlement-key -n $NS --ignore-not-found=true

                        echo "Creating new ibm-entitlement-key secret"
                        oc create secret docker-registry ibm-entitlement-key \
                            --docker-username=cp \
                            --docker-password=$(tasks.get-entitlement-key.results.secret-value) \
                            --docker-server=cp.icr.io \
                            --namespace=$NS
                    fi
                else
                    echo "Creating new ibm-entitlement-key secret"
                    oc create secret docker-registry ibm-entitlement-key \
                        --docker-username=cp \
                        --docker-password=$(tasks.get-entitlement-key.results.secret-value) \
                        --docker-server=cp.icr.io \
                        --namespace=$NS
                fi

