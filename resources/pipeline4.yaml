                sh > apim-analytics-instance.yaml

            echo "Creating APIC Analytics instance..."

            oc apply -f apim-analytics-instance.yaml -n ${NS_NAME}

            echo "Waiting for apic analytics instance to be ready..."

            while ! oc wait --for=condition=Ready
            analyticscluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC Analytics instance is ready"

            echo "Enabling AI using Analytics in API Manager"

            oc patch ManagementCluster/$DINST_NAME -n $NS_NAME --type=merge --patch '{"spec":{"ai":{"enabled":true,"apiAgent":{"enabled":true,"codegenEnabled":true,"rationalizationEnabled":true,"analyticsRef":{"name":"'$INST_NAME'","namespace":"'$NS_NAME'"}}}}}'

            echo "Waiting for apic management instance to be ready..."

            sleep 30

            while ! oc wait --for=condition=Ready
            managementcluster/$DINST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC Management instance has been updated"
