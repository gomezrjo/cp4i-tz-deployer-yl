                    --output apic-response-data.json \
                    --write-out '%{response_code}' \
                    $APIC_MGMT_SERVER_URL/api/orgs/admin/tls-client-profiles)
                  if [[ "${RESP_CODE}" != "200" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                      echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                      echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                      echo "Check API Manager is up and running and properly configured."
                    fi
                  else
                    echo "Validating if Federated API Management TLS Client Profile exists..."
                    SVC_TLS_CPRO_URL=$(jq -r --arg obj_name $SVC_TLS_CLIENT_PROFILE_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                    if [ ! -z "$SVC_TLS_CPRO_URL" ]; then
                      echo "Creating Federated API Managememt Definition..."
                      FAM_MGMT_URL="https://$(oc get route ${FAM_INST_NAME}-admin-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                      FAM_UI_URL="https://$(oc get route ${FAM_INST_NAME}-ui-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                      ( echo "cat <<EOF" ; cat templates/template-apic-fam-config.json ;) | \
                        FAM_MGMT_URL=${FAM_MGMT_URL} \
                        SVC_TLS_CPRO_URL=${SVC_TLS_CPRO_URL} \
                        FAM_ADMIN_PWD=${FAM_ADMIN_PWD} \
                        FAM_ADMIN_USER=${FAM_ADMIN_USER} \
                        FAM_UI_URL=${FAM_UI_URL} \
                        APIC_MGMT_RUNTIME_ID=${APIC_MGMT_RUNTIME_ID} \
                        APIC_MGMT_RUNTIME_NAME=${APIC_MGMT_RUNTIME_NAME} \
                        sh > apic-fam-config.json
                      echo "Configuring Federated API Management..."
                      RESP_CODE=$(curl -X PUT -s -k \
                        --dump-header apic-api-header \
                        -H 'Accept: application/json' \
                        -H 'Content-Type: application/json' \
                        -H "Authorization: Bearer $API_TOKEN" \
                        --data @apic-fam-config.json \
                        --output apic-response-data.json \
                        --write-out '%{response_code}' \
                        $APIC_MGMT_SERVER_URL/api/cloud/settings)
                      if [[ "${RESP_CODE}" != "200" ]]; then
                        if [[ "${RESP_CODE}" == "401" ]]; then
                          echo "APIC Credentials are not valid. Check the values and correct them."
                        else
                          echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                          echo "Check API Manager is up and running and properly configured."
                        fi
                      else
                        echo "Federated API Management has been configured."
                      fi
                    else
                      echo "ERROR: Federated API Management TLS Client Profile is not available in your APIC stack. Check your environment and try again."
                    fi
                  fi

                else
                  echo "Federated API Management is already enabled."
                fi
              fi
            fi

            echo "Cleaning up temp files..."

            rm -f apic-login.json
            
            rm -f apic-fam-config.json
            
            rm -f apic-api-header
            
            rm -f apic-response-data.json
