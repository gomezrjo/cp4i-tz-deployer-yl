            INST_VER=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "NanoGatewayCluster") | .spec.version')
            
            #INST_LIC=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "NanoGatewayCluster") | .spec.license.license')

            #INST_LIC="L-AMGN-4YQ9TJ"

            INST_LIC=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "ManagementCluster") | .spec.license.license')

            echo "Preparing YAML file..."

            STACK_HOST="apps."$(oc get dnses.config.openshift.io cluster -o jsonpath='{.spec.baseDomain}')

            ( echo "cat <<EOF" ; cat instances/common/44-apic-nano-gwy-instance.yaml ;) | \
