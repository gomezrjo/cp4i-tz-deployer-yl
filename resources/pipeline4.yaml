    - name: apic-management-initial-config
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            echo "Configuring apic management instance"

            echo "Setting apic variables"

            NS_NAME=$(params.APIC_NAMESPACE)

            INST_NAME='management'

            MAILSVR_HOST='mailpit-smtp.mailpit.svc.cluster.local'

            MAILSVR_PORT=1025

            ADMINUSER_EMAIL='admin@cp4i.demo.net'

            APIC_REALM='admin/default-idp-1'

            APIC_ADMIN_USER='admin'

            APIC_ADMIN_PWD=''

            APIC_ADMIN_ORG='admin'

            APIC_MAILSERVER_NAME='mailpit-server'

            APIC_MAILSERVER_TITLE='Mail Pit Server'

            APIC_CMC_USER='integration-admin'
    
            APIC_USER_REGISTRY='integration-keycloak'

            APIC_AVAILABILITY_ZONE='availability-zone-default'

            APIC_MGMT_INST_NAME='management'

            API_TOKEN=''

            echo "Getting APIC access info..." 

            APIC_MGMT_SERVER_URL="https://"$(oc get route "${APIC_MGMT_INST_NAME}-platform-api" -n $NS_NAME -o jsonpath="{.spec.host}" --ignore-not-found)

            APIC_ADMIN_PWD=$(oc get secret "${APIC_MGMT_INST_NAME}-admin-secret" -n $NS_NAME -o jsonpath="{.data.password}" --ignore-not-found | base64 -d)

            oc get secret "${APIC_MGMT_INST_NAME}-cli-cred" -n $NS_NAME -o jsonpath="{.data.credential\\.json}" | base64 -d > credential.json

            CLIENT_ID=$(jq -r '.id' credential.json)

            CLIENT_SECRET=$(jq -r '.secret' credential.json)

            rm -f credential.json

            ( echo "cat <<EOF" ; cat templates/template-apic-login.json ;) | \
              CLIENT_ID=${CLIENT_ID} \
              CLIENT_SECRET=${CLIENT_SECRET} \
              APIC_ADMIN_PWD=${APIC_ADMIN_PWD} \
              APIC_REALM=${APIC_REALM} \
              APIC_ADMIN_USER=${APIC_ADMIN_USER} \
              sh > apic-login.json

            echo "Checking apic management instance is ready..."

            while ! oc wait --for=condition=Ready
            managementcluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC Management instance is ready to be configured..."

            echo "Login to APIC with CMC Admin User..."

            RESP_CODE=$(curl -X POST -s -k \
              --dump-header apic-api-header \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/json' \
              --data @apic-login.json \
              --output apic-response-data.json \
              --write-out '%{response_code}' \
              $APIC_MGMT_SERVER_URL/api/token)

            if [[ "${RESP_CODE}" != "200" ]]; then
                if [[ "${RESP_CODE}" == "401" ]]; then
                    echo "APIC Credentials are not valid. Check the values and correct them."
                else
                    echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                    echo "Check API Manager is up and running and properly configured."
                fi
            else
                echo "Updating User Registry..."
                #API_TOKEN="00000000-0000-0000-0000-000000000000"
                API_TOKEN=$(jq -r '.access_token' apic-response-data.json)
                RESP_CODE=$(curl -X PATCH -s -k \
                  --dump-header apic-api-header \
                  -H 'Accept: application/json' \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: Bearer $API_TOKEN" \
                  --data @resources/87-apicv12-lur-settings.json \
                  --output apic-response-data.json \
                  --write-out '%{response_code}' \
                  $APIC_MGMT_SERVER_URL/api/user-registries/admin/api-manager-lur)
                if [[ "${RESP_CODE}" != "200" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                        echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                        echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                        echo "Check API Manager is up and running and properly configured."
                    fi
                else
                    echo "User Registry has been updated."
                fi
                echo "Getting Mail Servers..."
                RESP_CODE=$(curl -X GET -s -k \
                  --dump-header apic-api-header \
                  -H 'Accept: application/json' \
                  -H "Authorization: Bearer $API_TOKEN" \
                  --output apic-response-data.json \
                  --write-out '%{response_code}' \
                  $APIC_MGMT_SERVER_URL/api/orgs/admin/mail-servers)
                if [[ "${RESP_CODE}" != "200" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                        echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                        echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                        echo "Check API Manager is up and running and properly configured."
                    fi
                else
                    echo "Validating If Mail Server Exists..."
                    MAILSVR_URL=$(jq -r --arg obj_name $APIC_MAILSERVER_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                    if [ -z "$MAILSVR_URL" ]; then
                        echo "Creating Mail Server Definition..."
                        ( echo "cat <<EOF" ; cat templates/template-apic-mail-server.json ;) | \
                          MAILSVR_NAME=${APIC_MAILSERVER_NAME} \
                          MAILSVR_TITLE=${APIC_MAILSERVER_TITLE} \
                          MAILSVR_HOST=${MAILSVR_HOST} \
                          MAILSVR_PORT=${MAILSVR_PORT} \
                          sh > apic-mail-server.json
                        RESP_CODE=$(curl -X POST -s -k \
                          --dump-header apic-api-header \
                          -H 'Accept: application/json' \
                          -H 'Content-Type: application/json' \
                          -H "Authorization: Bearer $API_TOKEN" \
                          --data @apic-mail-server.json \
                          --output apic-response-data.json \
                          --write-out '%{response_code}' \
                          $APIC_MGMT_SERVER_URL/api/orgs/admin/mail-servers)
                        if [[ "${RESP_CODE}" != "201" ]]; then
                            if [[ "${RESP_CODE}" == "401" ]]; then
                                echo "APIC Credentials are not valid. Check the values and correct them."
                            else
                                echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                echo "Check API Manager is up and running and properly configured."
                            fi
                        else
                            echo "Mail Server $APIC_MAILSERVER_NAME has been defined."
                            MAILSVR_URL=$(jq -r '.url' apic-response-data.json)
                        fi
                    else
                        echo "Mail Server $APIC_MAILSERVER_NAME already exists."
                    fi
                fi
                if [ ! -z "$MAILSVR_URL" ]; then
                    echo "Creating Cloud Settings Definition..."
                    ( echo "cat <<EOF" ; cat templates/template-apic-cloud-settings.json ;) | \
                      MAILSVR_URL=${MAILSVR_URL} \
                      sh > apic-cloud-settings.json
                    echo "Updating Cloud Settings..."
                    RESP_CODE=$(curl -X PUT -s -k \
                      --dump-header apic-api-header \
                      -H 'Accept: application/json' \
                      -H 'Content-Type: application/json' \
                      -H "Authorization: Bearer $API_TOKEN" \
                      --data @apic-cloud-settings.json \
                      --output apic-response-data.json \
                      --write-out '%{response_code}' \
                      $APIC_MGMT_SERVER_URL/api/cloud/settings)
                    if [[ "${RESP_CODE}" != "200" ]]; then
                        if [[ "${RESP_CODE}" == "401" ]]; then
                            echo "APIC Credentials are not valid. Check the values and correct them."
                        else
                            echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                            echo "Check API Manager is up and running and properly configured."
                        fi
                    else
                        echo "Cloud Settings have been updated."
                    fi
                else
                    echo "Can not update Cloud Setting, Mail Server not available."
                fi
            fi

            echo "Cleaning up temp files..."
            
            rm -f apic-login.json
            
            rm -f apic-mail-server.json
            
            rm -f apic-cloud-settings.json
            
            rm -f apic-api-header
            
            rm -f apic-response-data.json
        - name: VERSION
          value: latest
      runAfter:
        - apic-management-inst-deployment
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_DATAPOWER_GATEWAY_OPERATOR)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_API_CONNECT_OPERATOR)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_API_CONNECT)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_APIC_V12)"
          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: apic-management-porg-config
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            echo "Configuring apic management instance"

            echo "Setting apic variables"

            USER_NAME=$(params.PORG_OWNER_ID)

            USER_EMAIL=$(params.PORG_OWNER_EMAIL)

            USER_FNAME=$(params.PORG_OWNER_FNAME)

            USER_LNAME=$(params.PORG_OWNER_LNAME)

            NS_NAME=$(params.APIC_NAMESPACE)

            INST_NAME="management"

            APIC_REALM='admin/default-idp-1'

            APIC_ADMIN_USER='admin'

            APIC_ADMIN_PWD=''

            APIC_ADMIN_ORG='admin'

            APIC_CMC_USER='integration-admin'

            APIC_USER_REGISTRY='integration-keycloak'

            APIC_MGMT_INST_NAME='management'

            API_TOKEN=''

            PORG_NAME='user-demo-org'

            PORG_TITLE='USER Demo Provider Org'

            USER_INFO=''

            echo "Getting APIC access info."

            APIC_MGMT_SERVER_URL="https://"$(oc get route "${APIC_MGMT_INST_NAME}-platform-api" -n $NS_NAME -o jsonpath="{.spec.host}" --ignore-not-found)

            APIC_ADMIN_PWD=$(oc get secret "${APIC_MGMT_INST_NAME}-admin-secret" -n $NS_NAME -o jsonpath="{.data.password}" --ignore-not-found | base64 -d)

            oc get secret "${APIC_MGMT_INST_NAME}-cli-cred" -n $NS_NAME -o jsonpath="{.data.credential\\.json}" | base64 -d > credential.json

            CLIENT_ID=$(jq -r '.id' credential.json)

            CLIENT_SECRET=$(jq -r '.secret' credential.json)

            rm -f credential.json

            ( echo "cat <<EOF" ; cat templates/template-apic-login.json ;) | \
              CLIENT_ID=${CLIENT_ID} \
              CLIENT_SECRET=${CLIENT_SECRET} \
              APIC_ADMIN_PWD=${APIC_ADMIN_PWD} \
              APIC_REALM=${APIC_REALM} \
              APIC_ADMIN_USER=${APIC_ADMIN_USER} \
              sh > apic-login.json

            echo "Login to APIC with CMC Admin User..."

            RESP_CODE=$(curl -X POST -s -k \
              --dump-header apic-api-header \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/json' \
              --data @apic-login.json \
              --output apic-response-data.json \
              --write-out '%{response_code}' \
              $APIC_MGMT_SERVER_URL/api/token)

            if [[ "${RESP_CODE}" != "200" ]]; then
              if [[ "${RESP_CODE}" == "401" ]]; then
                echo "APIC Credentials are not valid. Check the values and correct them."
              else
                echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                echo "Check API Manager is up and running and properly configured."
              fi
            else
              echo "Getting Users..."
              API_TOKEN=$(jq -r '.access_token' apic-response-data.json)
              #API_TOKEN="00000000-0000-0000-0000-000000000000"
              RESP_CODE=$(curl -X GET -s -k \
                --dump-header apic-api-header \
                -H 'Accept: application/json' \
                -H "Authorization: Bearer $API_TOKEN" \
                --output apic-response-data.json \
                --write-out '%{response_code}' \
                $APIC_MGMT_SERVER_URL/api/user-registries/admin/api-manager-lur/users)
              if [[ "${RESP_CODE}" != "200" ]]; then
                if [[ "${RESP_CODE}" == "401" ]]; then
