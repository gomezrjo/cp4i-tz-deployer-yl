            fi

            echo "Getting info from CSV..."
            
            SUB_NAME=$(oc get deployment ibm-apiconnect -n openshift-operators -o jsonpath='{.metadata.labels.olm\.owner}')
            
            INST_VER=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "WMAPIGatewayCluster") | .spec.version')
            
            INST_LIC=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "WMAPIGatewayCluster") | .spec.license.license')

            echo "Preparing YAML file..."
            
            STACK_HOST="apps."$(oc get dnses.config.openshift.io cluster -o jsonpath='{.spec.baseDomain}')
            
            ( echo "cat <<EOF" ; cat instances/common/43-apic-wm-gwy-instance.yaml ;) | \
              INST_NAME=${INST_NAME} \
              INST_VER=${INST_VER} \
              INST_LIC=${INST_LIC} \
              STACK_HOST=${STACK_HOST} \
              OCP_BLOCK_STORAGE=${OCP_BLOCK_STORAGE} \
              sh > apic-wm-gwy-instance.yaml

            echo "Creating wM API Gateway instance..."
            
            oc apply -f apic-wm-gwy-instance.yaml -n ${NS_NAME}

            echo "Cleaning up temp file..."
            rm -f apic-wm-gwy-instance.yaml

            echo "Waiting for apic wM API Gateway instance to be ready..."

            while ! oc wait --for=condition=Ready
            wmapigatewaycluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC wM API Gateway instance is ready"
