    - name: apic-porg-gateways-config
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            INST_NAME="apim-demo"

            NS_NAME=$(params.APIC_NAMESPACE)
            
            APIC_REALM='provider/default-idp-2'
            
            PORG_USER_NAME=''
            
            PORG_USER_PWD=''
            
            PORG_NAME=''
            
            APIC_CMC_USER='integration-admin'
            
            APIC_USER_REGISTRY='integration-keycloak'

            APIC_MGMT_INST_NAME='management'
            
            API_TOKEN=''

            GTWY_SVC_NAMES=(api-gateway-service nano-gateway-service wm-gateway-service)

            echo "Preparing User(s) access info."

            CONFIG_DATA=$(oc get secret porg-lur-users-info -n $NS_NAME --ignore-not-found -o jsonpath='{.data.porg-lur-users-config\.json}')

            echo $CONFIG_DATA | base64 -d > porg-lur-users-info.json

            echo "Getting APIC access info."

            APIC_MGMT_SERVER_URL="https://"$(oc get route "${APIC_MGMT_INST_NAME}-platform-api" -n $NS_NAME -o jsonpath="{.spec.host}" --ignore-not-found)

            oc get secret "${APIC_MGMT_INST_NAME}-cli-cred" -n $NS_NAME -o jsonpath="{.data.credential\\.json}" | base64 -d > credential.json

            CLIENT_ID=$(jq -r '.id' credential.json)

            CLIENT_SECRET=$(jq -r '.secret' credential.json)

            rm -f credential.json

            NUM_USERS=$(jq '.users | length' porg-lur-users-info.json)

            for USER_IND in $(seq 1 $NUM_USERS); do
              echo "Preparing APIC login info."
              PORG_USER_NAME=$(jq --argjson i $((USER_IND - 1)) -r '.users[$i].userId' porg-lur-users-info.json)
              PORG_USER_PWD=$(jq --argjson i $((USER_IND - 1)) -r '.users[$i].password' porg-lur-users-info.json)
              ( echo "cat <<EOF" ; cat templates/template-apic-login.json ;) | \
                CLIENT_ID=${CLIENT_ID} \
                CLIENT_SECRET=${CLIENT_SECRET} \
                APIC_ADMIN_PWD=${PORG_USER_PWD} \
                APIC_REALM=${APIC_REALM} \
                APIC_ADMIN_USER=${PORG_USER_NAME} \
                sh > apic-login.json
              echo "Login to APIC with User $PORG_USER_NAME to Provider Organization..."
              RESP_CODE=$(curl -X POST -s -k \
                --dump-header apic-api-header \
                -H 'Accept: application/json' \
                -H 'Content-Type: application/json' \
                --data @apic-login.json \
                --output apic-response-data.json \
                --write-out '%{response_code}' \
                $APIC_MGMT_SERVER_URL/api/token)
              if [[ "${RESP_CODE}" != "200" ]]; then
                if [[ "${RESP_CODE}" == "401" ]]; then
                  echo "APIC Credentials are not valid. Check the values and correct them."
                else
                  echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                  echo "Check API Manager is up and running and properly configured."
                fi
              else
                API_TOKEN=$(jq -r '.access_token' apic-response-data.json)
                #API_TOKEN="00000000-0000-0000-0000-000000000000"
                jq --arg user_name $PORG_USER_NAME '.users | .[] | select(.userId == $user_name).porgName' porg-lur-users-info.json > porgs-info.json
                NUM_PORGS=$(jq 'length' porgs-info.json)
                for PORG_IND in $(seq 1 $NUM_PORGS); do
                  PORG_NAME=$(jq --argjson i $((PORG_IND - 1)) -r '.[$i]' porgs-info.json)
                  echo "Getting Gateway Services in Provider Organization $PORG_NAME..."
                  RESP_CODE=$(curl -X GET -s -k \
                    --dump-header apic-api-header \
                    -H 'Accept: application/json' \
                    -H "Authorization: Bearer $API_TOKEN" \
                    --output apic-response-data.json \
                    --write-out '%{response_code}' \
                    $APIC_MGMT_SERVER_URL/api/orgs/$PORG_NAME/gateway-services)
                  if [[ "${RESP_CODE}" != "200" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                      echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                      echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                      echo "Check API Manager is up and running and properly configured."
                    fi
                  else
                    cp apic-response-data.json gtwy-svcs-porg-list.json
                    echo "Getting Gateway Services in Sandbox Catalog..."
                    RESP_CODE=$(curl -X GET -s -k \
                      --dump-header apic-api-header \
                      -H 'Accept: application/json' \
                      -H "Authorization: Bearer $API_TOKEN" \
                      --output apic-response-data.json \
                      --write-out '%{response_code}' \
                      $APIC_MGMT_SERVER_URL/api/catalogs/$PORG_NAME/sandbox/configured-gateway-services)
                    if [[ "${RESP_CODE}" != "200" ]]; then
                      if [[ "${RESP_CODE}" == "401" ]]; then
                        echo "APIC Credentials are not valid. Check the values and correct them."
                      else
                        echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                        echo "Check API Manager is up and running and properly configured."
                      fi
                    else
                      cp apic-response-data.json gtwy-svcs-catalog-list.json
                      for GSN in "${GTWY_SVC_NAMES[@]}"; do
                        echo "Validating if Gateway Service exists in Sandbox Catalog..."
                        GTWY_SVC_URL=$(jq -r --arg obj_name $GSN '.results[] | select(.name == $obj_name) | .url' gtwy-svcs-catalog-list.json)
                        if [ -z "$GTWY_SVC_URL" ]; then
                          GTWY_SVC_URL=$(jq -r --arg obj_name $GSN '.results[] | select(.name == $obj_name) | .url' gtwy-svcs-porg-list.json)
                          if [ ! -z "$GTWY_SVC_URL" ]; then
                            echo "Adding Gateway Service $GSN to Sandbox Catalog..."
                            ( echo "cat <<EOF" ; cat templates/template-apic-gtwy-svc-catalog.json ;) | \
                              GTWY_SVC_URL=${GTWY_SVC_URL} \
                              sh > apic-gtwy-svc-catalog.json
                            RESP_CODE=$(curl -X POST -s -k \
                              --dump-header apic-api-header \
                              -H 'Accept: application/json' \
                              -H 'Content-Type: application/json' \
                              -H "Authorization: Bearer $API_TOKEN" \
                              --data @apic-gtwy-svc-catalog.json \
                              --output apic-response-data.json \
                              --write-out '%{response_code}' \
                              $APIC_MGMT_SERVER_URL/api/catalogs/$PORG_NAME/sandbox/configured-gateway-services)
                            if [[ "${RESP_CODE}" != "201" ]]; then
                              if [[ "${RESP_CODE}" == "401" ]]; then
                                echo "APIC Credentials are not valid. Check the values and correct them."
                              else
                                echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                echo "Check API Manager is up and running and properly configured."
                              fi
                            else
                              echo "Gateway Service $GSN has been added to Sandbox Catalog in POrg $PORG_NAME."
                            fi
                            rm -f apic-gtwy-svc-catalog.json
                          else
                            echo "Gateway Service $GSN is not available in environment. Check and try again."
                          fi
                        else
                          echo "Gateway Service $GSN already exists in Sandbox Catalog in POrg $PORG_NAME."
                        fi
                      done
                      rm -f gtwy-svcs-catalog-list.json
                    fi
                    rm -f gtwy-svcs-porg-list.json
                  fi
                done
                rm -f porgs-info.json
              fi
              rm -f apic-login.json
            done

            echo "Cleaning up temp files..."

            rm -f porg-lur-users-info.json
            
            rm -f apic-api-header
            
            rm -f apic-response-data.json
        - name: VERSION
          value: latest
      runAfter:
        - apic-fed-api-mgmt-initial-config
