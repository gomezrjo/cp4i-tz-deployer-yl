                                else
                                  echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                  echo "Check API Manager is up and running and properly configured."
                                fi
                              else
                                echo "Validating If Analytics Service Exists..."
                                A7SSVC_URL=$(jq -r --arg obj_name $APIC_A7S_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                                if [ -z "$A7SSVC_URL" ]; then
                                  jq 'del(.analytics_service_url, .runtime_name, .runtime_id)' templates/template-apic-api-gateway-service.json > temp-apic-api-gateway-service.json
                                else
                                  jq 'del(.runtime_name, .runtime_id)' templates/template-apic-api-gateway-service.json > temp-apic-api-gateway-service.json
                                fi
                                echo "Creating DP API Gateway Service Definition..."
                                DP_API_GW_MGMT_URL="https://$(oc get route ${DP_API_GW_INST_NAME}-gateway-manager -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                                DP_API_GW_URL="https://$(oc get route ${DP_API_GW_INST_NAME}-gateway -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                                ( echo "cat <<EOF" ; cat temp-apic-api-gateway-service.json ;) | \
