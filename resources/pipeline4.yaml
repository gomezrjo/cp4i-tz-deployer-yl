          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: apic-cms-dev-portal-initial-config
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

