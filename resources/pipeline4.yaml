          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            NS_NAME=$(params.APIC_NAMESPACE)

            INST_NAME="management"

            SUB_NAME=$(oc get deployment ibm-apiconnect -n openshift-operators -o jsonpath='{.metadata.labels.olm\.owner}')

            INST_VER=$(oc get csv $SUB_NAME -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | [.[] | select(.kind == "APIConnectCluster")] | .[] | select(.metadata.name == "small") | .spec.version')

            INST_LIC=$(oc get csv $SUB_NAME -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | [.[] | select(.kind == "APIConnectCluster")] | .[] | select(.metadata.name == "small") | .spec.license.license')

            echo "Confirming APIC Operator is ready"

            while ! oc wait --for=jsonpath='{.status.phase}'=Succeeded 
            csv/$SUB_NAME -n $NS_NAME 2>/dev/null; do sleep 30; done
            
            echo "Getting info from CSV..."

            echo "Preparing apic management instance manifest"

            STACK_HOST="apps."$(oc get dnses.config.openshift.io cluster -o jsonpath='{.spec.baseDomain}')

            (echo "cat <<EOF" ; cat instances/common/40-apic-mgmt-instance.yaml ;) | \
                INST_NAME=${INST_NAME} \
                INST_VER=${INST_VER} \
                INST_LIC=${INST_LIC} \
                STACK_HOST=${STACK_HOST} \
                OCP_BLOCK_STORAGE=$(params.OCP_BLOCK_STORAGE) \
                sh > apic-mgmt-instance.yaml

            echo "Deploying apic management instance"

            while oc apply -f apic-mgmt-instance.yaml -n $NS_NAME 2>/dev/null; [[ $? -ne 0 ]];
            do
              echo "Apply unsuccessful"
              sleep 30
            done

            echo "Waiting for apic management instance to be ready..."

            while ! oc wait --for=condition=Ready
            managementcluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC Management instance is ready"
