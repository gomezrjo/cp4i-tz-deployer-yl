    - name: apic-dp-v5-gateway-inst-deployment
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            INST_NAME="gwv5"

            NS_NAME=$(params.APIC_NAMESPACE)

            echo "Defining DP Admin password..."
            
            if [[ -z "$(oc get secret admin-secret -n ${NS_NAME} --no-headers --ignore-not-found=true)" ]]; then
              oc -n ${NS_NAME} create secret generic admin-secret --from-literal=password=admin
            else
              echo "DP Gateway admin-secret already exists in namespace $NS_NAME" "GREEN"
            fi

            echo "Getting info from CSV..."
            
            SUB_NAME=$(oc get deployment ibm-apiconnect -n openshift-operators -o jsonpath='{.metadata.labels.olm\.owner}')
            
            INST_VER=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "GatewayCluster") | .spec.version')
            
            INST_LIC=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "GatewayCluster") | .spec.license.license')

            echo "Preparing YAML file..."
            
            STACK_HOST="apps."$(oc get dnses.config.openshift.io cluster -o jsonpath='{.spec.baseDomain}')
            
            ( echo "cat <<EOF" ; cat instances/common/42-apic-dp-v5-gwy-instance.yaml ;) | \
              INST_NAME=${INST_NAME} \
              INST_VER=${INST_VER} \
              INST_LIC=${INST_LIC} \
              STACK_HOST=${STACK_HOST} \
              sh > apic-dp-v5-gwy-instance.yaml

            echo "Creating APIC DP v5 Gateway instance..."
            
            oc apply -f apic-dp-v5-gwy-instance.yaml -n ${NS_NAME}

            echo "Cleaning up temp file..."

            rm -f apic-dp-v5-gwy-instance.yaml

            echo "Waiting for apic dp v5 gateway instance to be ready..."

            while ! oc wait --for=condition=Ready
            gatewaycluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC DP v5 Gateway instance is ready"
