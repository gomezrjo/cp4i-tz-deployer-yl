      workspaces:
        - name: cp4i-ws
    - name: apic-dp-nano-gateway-initial-config
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            INST_NAME="ngw"

            DINST_NAME="management"

            NS_NAME=$(params.APIC_NAMESPACE)
            
            APIC_REALM='admin/default-idp-1'

            APIC_ADMIN_USER='admin'
            
            APIC_ADMIN_PWD=''
            
            APIC_ADMIN_ORG='admin'
            
            APIC_SVC_NAME='nano-gateway-service'
            
            SVC_TLS_CLIENT_PROFILE_NAME='datapower-nano-gateway-mgmt-client-default'

            SVC_TLS_SERVER_PROFILE_NAME='datapower-nano-gateway-tls-server-profile'
            
            KEY_STORE_NAME='datapower-nano-gateway-keystore'

            APIC_CMC_USER='integration-admin'
            
            APIC_USER_REGISTRY='integration-keycloak'

            DP_NANO_GW_INST_NAME=$INST_NAME
            
            APIC_MGMT_INST_NAME=$DINST_NAME
            
            API_TOKEN=''

            APIC_INT_NAME='datapower-nano-gateway'
            
            APIC_A7S_NAME='analytics-service'

            GTW_SVC_TYPE='datapower-nano-gateway'

            echo "Preparing Certifcate..."

            DP_NANO_GW_DNS="$(oc get route ${DP_NANO_GW_INST_NAME}-nanogw -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
            
            DP_NANO_GW_DNS="${DP_NANO_GW_DNS/wildcard/*}"
            
            ( echo "cat <<EOF" ; cat templates/template-apic-ngw-certificate.yaml ;) | \
                DP_NANO_GW_DNS=${DP_NANO_GW_DNS} \
                sh > apic-ngw-certificate.yaml

            echo "Creating Nano Gateway Certifcate..."
            
            if [[ -z "$(oc get secret nano-gateway-app-tls --ignore-not-found --no-headers -n $NS_NAME)" ]]; then
              oc apply -f apic-ngw-certificate.yaml -n $NS_NAME
            else
              echo "Nano Gateway Certificate nano-gateway-app already exists."
            fi

            echo "Getting APIC access info."

            APIC_MGMT_SERVER_URL="https://"$(oc get route "${APIC_MGMT_INST_NAME}-platform-api" -n $NS_NAME -o jsonpath="{.spec.host}" --ignore-not-found)
            
            APIC_ADMIN_PWD=$(oc get secret "${APIC_MGMT_INST_NAME}-admin-secret" -n $NS_NAME -o jsonpath="{.data.password}" --ignore-not-found | base64 -d)

            oc get secret "${APIC_MGMT_INST_NAME}-cli-cred" -n $NS_NAME -o jsonpath="{.data.credential\\.json}" | base64 -d > credential.json
            
            CLIENT_ID=$(jq -r '.id' credential.json)
            
            CLIENT_SECRET=$(jq -r '.secret' credential.json)
            
            rm -f credential.json
            
            ( echo "cat <<EOF" ; cat templates/template-apic-login.json ;) | \
              CLIENT_ID=${CLIENT_ID} \
              CLIENT_SECRET=${CLIENT_SECRET} \
              APIC_ADMIN_PWD=${APIC_ADMIN_PWD} \
              APIC_REALM=${APIC_REALM} \
              APIC_ADMIN_USER=${APIC_ADMIN_USER} \
              sh > apic-login.json

            echo "Login to APIC with CMC Admin User..."

            RESP_CODE=$(curl -X POST -s -k \
              --dump-header apic-api-header \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/json' \
              --data @apic-login.json \
              --output apic-response-data.json \
              --write-out '%{response_code}' \
              $APIC_MGMT_SERVER_URL/api/token)

            if [[ "${RESP_CODE}" != "200" ]]; then
              if [[ "${RESP_CODE}" == "401" ]]; then
                echo "APIC Credentials are not valid. Check the values and correct them."
              else
                echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                echo "Check API Manager is up and running and properly configured."
              fi
            else
              echo "Getting Gateway Services..."
              API_TOKEN=$(jq -r '.access_token' apic-response-data.json)
              #API_TOKEN="00000000-0000-0000-0000-000000000000"
              RESP_CODE=$(curl -X GET -s -k \
                --dump-header apic-api-header \
                -H 'Accept: application/json' \
                -H "Authorization: Bearer $API_TOKEN" \
                --output apic-response-data.json \
                --write-out '%{response_code}' \
                $APIC_MGMT_SERVER_URL/api/orgs/admin/availability-zones/availability-zone-default/gateway-services)
              if [[ "${RESP_CODE}" != "200" ]]; then
                if [[ "${RESP_CODE}" == "401" ]]; then
                  echo "APIC Credentials are not valid. Check the values and correct them."
                else
                  echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                  echo "Check API Manager is up and running and properly configured."
                fi
              else
                echo "Validating if Gateway Service Exists..."
                SVC_URL=$(jq -r --arg obj_name $APIC_SVC_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                if [ -z "$SVC_URL" ]; then
                  echo "Getting Integration Gateway Services..."
                  RESP_CODE=$(curl -X GET -s -k \
                    --dump-header apic-api-header \
                    -H 'Accept: application/json' \
                    -H "Authorization: Bearer $API_TOKEN" \
                    --output apic-response-data.json \
                    --write-out '%{response_code}' \
                    $APIC_MGMT_SERVER_URL/api/cloud/integrations/gateway-service)
                  if [[ "${RESP_CODE}" != "200" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                      echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                      echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                      echo "Check API Manager is up and running and properly configured."
                    fi
                  else
                    echo "Validating if DP Nano Gateway Integration Service Exists..."
                    INT_URL=$(jq -r --arg obj_name $APIC_INT_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                    if [ ! -z "$INT_URL" ]; then
                      echo "Getting TLS Client Profiles..."
                      RESP_CODE=$(curl -X GET -s -k \
                        --dump-header apic-api-header \
                        -H 'Accept: application/json' \
                        -H "Authorization: Bearer $API_TOKEN" \
                        --output apic-response-data.json \
                        --write-out '%{response_code}' \
                        $APIC_MGMT_SERVER_URL/api/orgs/admin/tls-client-profiles)
                      if [[ "${RESP_CODE}" != "200" ]]; then
                        if [[ "${RESP_CODE}" == "401" ]]; then
                          echo "APIC Credentials are not valid. Check the values and correct them."
                        else
                          echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                          echo "Check API Manager is up and running and properly configured."
                        fi
                      else
                        echo "Validating if DP Nano Gateway TLS Client Profile exists..."
                        SVC_TLS_CPRO_URL=$(jq -r --arg obj_name $SVC_TLS_CLIENT_PROFILE_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                        if [ ! -z "$SVC_TLS_CPRO_URL" ]; then
                          echo "Getting TLS Server Profiles..."
                          RESP_CODE=$(curl -X GET -s -k \
                            --dump-header apic-api-header \
                            -H 'Accept: application/json' \
                            -H "Authorization: Bearer $API_TOKEN" \
                            --output apic-response-data.json \
                            --write-out '%{response_code}' \
                            $APIC_MGMT_SERVER_URL/api/orgs/admin/tls-server-profiles)
                          if [[ "${RESP_CODE}" != "200" ]]; then
                            if [[ "${RESP_CODE}" == "401" ]]; then
                              echo "APIC Credentials are not valid. Check the values and correct them."
                            else
                              echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                              echo "Check API Manager is up and running and properly configured."
                            fi
                          else
                            echo "Validating if DP Nano Gateway TLS Server Profile exists..."
                            SVC_TLS_SPRO_URL=$(jq -r --arg obj_name $SVC_TLS_SERVER_PROFILE_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                            if [ -z "$SVC_TLS_SPRO_URL" ]; then
                              echo "Getting Key Stores..."
                              RESP_CODE=$(curl -X GET -s -k \
                                --dump-header apic-api-header \
                                -H 'Accept: application/json' \
                                -H "Authorization: Bearer $API_TOKEN" \
                                --output apic-response-data.json \
                                --write-out '%{response_code}' \
                                $APIC_MGMT_SERVER_URL/api/orgs/admin/keystores)
                              if [[ "${RESP_CODE}" != "200" ]]; then
                                if [[ "${RESP_CODE}" == "401" ]]; then
                                  echo "APIC Credentials are not valid. Check the values and correct them."
                                else
                                  echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                  echo "Check API Manager is up and running and properly configured."
                                fi
                              else
                                echo "Validating if DP Nano Gateway Key Store exists..."
                                KEY_STORE_URL=$(jq -r --arg obj_name $KEY_STORE_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                                if [ -z "$KEY_STORE_URL" ]; then
                                  echo "Creating Key Store $KEY_STORE_NAME ..."
                                  oc extract secret/nano-gateway-app-tls -n $NS_NAME --keys=tls.crt
                                  oc extract secret/nano-gateway-app-tls -n $NS_NAME --keys=tls.key
                                  cat tls.crt tls.key > tls-combined.pem
                                  DP_NGW_CERT=$(awk 'NF {sub(/\r/, ""); printf "%s\\n",$0;}' tls-combined.pem)
                                  ( echo "cat <<EOF" ; cat templates/template-apic-nano-gateway-keystore.json ;) | \
                                    DP_NGW_CERT=${DP_NGW_CERT} \
                                    sh > apic-nano-gateway-keystore.json
                                  RESP_CODE=$(curl -X POST -s -k \
                                    --dump-header apic-api-header \
                                    -H 'Accept: application/json' \
                                    -H 'Content-Type: application/json' \
                                    -H "Authorization: Bearer $API_TOKEN" \
                                    --data @apic-nano-gateway-keystore.json \
                                    --output apic-response-data.json \
                                    --write-out '%{response_code}' \
                                    $APIC_MGMT_SERVER_URL/api/orgs/admin/keystores)
                                  if [[ "${RESP_CODE}" != "201" ]]; then
                                    if [[ "${RESP_CODE}" == "401" ]]; then
                                      echo "APIC Credentials are not valid. Check the values and correct them."
                                    else
                                      echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                      echo "Check API Manager is up and running and properly configured."
                                    fi
                                  else
                                    echo "Key Store $KEY_STORE_NAME has been defined."
                                    KEY_STORE_URL=$(jq -r '.url' apic-response-data.json)
                                  fi
                                else
                                  echo "Key Store $KEY_STORE_NAME already exists."
                                fi
                                echo "Creating TLS Server Profile $SVC_TLS_SERVER_PROFILE_NAME ..."
                                ( echo "cat <<EOF" ; cat templates/template-apic-nano-gateway-tls-server-profile.json ;) | \
                                  KEYSTORE_URL=${KEY_STORE_URL} \
                                  sh > apic-nano-gateway-tls-server-profile.json
                                RESP_CODE=$(curl -X POST -s -k \
                                  --dump-header apic-api-header \
                                  -H 'Accept: application/json' \
                                  -H 'Content-Type: application/json' \
                                  -H "Authorization: Bearer $API_TOKEN" \
                                  --data @apic-nano-gateway-tls-server-profile.json \
                                  --output apic-response-data.json \
                                  --write-out '%{response_code}' \
                                  $APIC_MGMT_SERVER_URL/api/orgs/admin/tls-server-profiles)
                                if [[ "${RESP_CODE}" != "201" ]]; then
                                  if [[ "${RESP_CODE}" == "401" ]]; then
                                    echo "APIC Credentials are not valid. Check the values and correct them."
                                  else
                                    echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                    echo "Check API Manager is up and running and properly configured."
                                  fi
                                else
                                  echo "TLS Server Profile $SVC_TLS_SERVER_PROFILE_NAME has been defined."
                                  SVC_TLS_SPRO_URL=$(jq -r '.url' apic-response-data.json)
                                fi
                              fi
                            else
                              echo "TLS Server Profile $SVC_TLS_SERVER_PROFILE_NAME already exists."
                            fi
                            echo "Getting Analytics Services..."
                            RESP_CODE=$(curl -X GET -s -k \
                              --dump-header apic-api-header \
                              -H 'Accept: application/json' \
                              -H "Authorization: Bearer $API_TOKEN" \
                              --output apic-response-data.json \
                              --write-out '%{response_code}' \
                              $APIC_MGMT_SERVER_URL/api/orgs/admin/availability-zones/availability-zone-default/analytics-services)
                            if [[ "${RESP_CODE}" != "200" ]]; then 
                              if [[ "${RESP_CODE}" == "401" ]]; then
                                echo "APIC Credentials are not valid. Check the values and correct them."
                              else
                                echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                echo "Check API Manager is up and running and properly configured."
                              fi
                            else
                              echo "Validating if Analytics Service Exists..."
                              A7SSVC_URL=$(jq -r --arg obj_name $APIC_A7S_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                              if [ -z "$A7SSVC_URL" ]; then
                                jq 'del(.analytics_service_url, .ai_gateway_enabled, .runtime_name, .runtime_id)' templates/template-apic-api-gateway-service.json > temp-apic-api-gateway-service.json
                              else
                                jq 'del(.ai_gateway_enabled, .runtime_name, .runtime_id)' templates/template-apic-api-gateway-service.json > temp-apic-api-gateway-service.json
                              fi
                              echo "Creating Nano Gateway Service Definition..."
                              DP_NANO_GW_MGMT_URL="https://$(oc get route ${DP_NANO_GW_INST_NAME}-mgmt-endpoint -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                              DP_NANO_GW_URL="https://$(oc get route ${DP_NANO_GW_INST_NAME}-nanogw -n $NS_NAME --ignore-not-found -o jsonpath='{.spec.host}')"
                              DP_NANO_GW_URL="${DP_NANO_GW_URL/wildcard/*}"
                              ( echo "cat <<EOF" ; cat temp-apic-api-gateway-service.json ;) | \
                                GTW_SVC_TYPE=${GTW_SVC_TYPE} \
                                APIC_SVC_NAME=${APIC_SVC_NAME} \
                                INT_URL=${INT_URL} \
                                GW_MGMT_URL=${DP_NANO_GW_MGMT_URL} \
                                GW_URL=${DP_NANO_GW_URL} \
                                SVC_TLS_CPRO_URL=${SVC_TLS_CPRO_URL} \
                                SVC_TLS_SPRO_URL=${SVC_TLS_SPRO_URL} \
                                A7SSVC_URL=${A7SSVC_URL} \
                                sh > apic-api-gateway-service.json
                              echo "Creating wM API Gateway Service..."
                              RESP_CODE=$(curl -X POST -s -k \
                                --dump-header apic-api-header \
                                -H 'Accept: application/json' \
                                -H 'Content-Type: application/json' \
                                -H "Authorization: Bearer $API_TOKEN" \
                                --data @apic-api-gateway-service.json \
                                --output apic-response-data.json \
                                --write-out '%{response_code}' \
                                $APIC_MGMT_SERVER_URL/api/orgs/admin/availability-zones/availability-zone-default/gateway-services)
                              if [[ "${RESP_CODE}" != "201" ]]; then
                                if [[ "${RESP_CODE}" == "401" ]]; then
                                  echo "APIC Credentials are not valid. Check the values and correct them."
                                else
                                  echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                                  echo "Check API Manager is up and running and properly configured."
                                fi
                              else
                                echo "DP Nano Gateway Service $APIC_SVC_NAME has been defined."
                              fi
                            fi
                          fi
                        else
                          echo "ERROR: DP Nano Gateway TLS Client Profile is not available in your APIC stack. Check your environment and try again."
                        fi
                      fi
                    else
                      echo "ERROR: DP Nano Gateway Integration Service is not available in your APIC stack. Check your environment and try again."
                    fi
                  fi
                else
                  echo "Gateway Service $APIC_SVC_NAME already exists."
                fi
              fi
            fi

            echo "Cleaning up temp files..."
            
            rm -f apic-login.json
            
            rm -f temp-apic-api-gateway-service.json
            
            rm -f apic-api-gateway-service.json
            
            rm -f apic-api-header
            
            rm -f apic-response-data.json
        - name: VERSION
          value: latest
      runAfter:
        - apic-dp-nano-gateway-inst-deployment
      taskRef:
        kind: Task
        name: jgr-task-0.2
      when:
        - input: "$(params.CP4I_VERSION)"
          operator: in
          values: ["CD"]
        - input: "$(tasks.setup-workspace.results.output)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_DATAPOWER_GATEWAY_OPERATOR)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_API_CONNECT_OPERATOR)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_API_CONNECT)"
          operator: in
          values: ["true"]
        - input: "$(params.DEPLOY_APIC_V12)"
          operator: in
          values: ["true"]
      workspaces:
        - name: cp4i-ws
    - name: apic-cms-dev-portal-inst-deployment
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            OCP_BLOCK_STORAGE=$(params.OCP_BLOCK_STORAGE)

            INST_NAME="portal"

            NS_NAME=$(params.APIC_NAMESPACE)

            echo "Getting info from CSV..."

            SUB_NAME=$(oc get deployment ibm-apiconnect -n openshift-operators -o jsonpath='{.metadata.labels.olm\.owner}')
            
            INST_VER=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "PortalCluster") | .spec.version')
            
            INST_LIC=$(oc get csv $SUB_NAME -n openshift-operators -o json | jq -r '.metadata.annotations."alm-examples" | fromjson | .[] | select(.kind == "PortalCluster") | .spec.license.license')

            echo "Preparing YAML file..."

            STACK_HOST="apps."$(oc get dnses.config.openshift.io cluster -o jsonpath='{.spec.baseDomain}')
            
            ( echo "cat <<EOF" ; cat instances/common/45-apic-cms-dev-portal-instance.yaml ;) | \
              INST_NAME=${INST_NAME} \
              INST_VER=${INST_VER} \
              INST_LIC=${INST_LIC} \
              STACK_HOST=${STACK_HOST} \
              OCP_BLOCK_STORAGE=${OCP_BLOCK_STORAGE} \
              sh > apic-cms-dev-portal-instance.yaml

            echo "Creating CMS Dev Portal instance..."

            oc apply -f apic-cms-dev-portal-instance.yaml -n ${NS_NAME}

            echo "Cleaning up temp file..."
            
            rm -f apic-cms-dev-portal-instance.yaml

            echo "Waiting for apic CMS Dev Portal instance to be ready..."

            while ! oc wait --for=condition=Ready
            portalcluster/$INST_NAME -n
            $NS_NAME  2>/dev/null; do sleep 300; done

            echo "APIC CMS Dev Portal instance is ready"
