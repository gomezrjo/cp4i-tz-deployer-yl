    - name: valkey-instance-deployment
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            cd workspace/cp4i-ws/cp4i-deployer-helper

            NAMESPACE=$(params.APIC_NAMESPACE)

            SECRET_NAME="valkey-tls"

            mkdir -p certs

            cd certs

            echo "Generate CA key and certificate"

            openssl genrsa -out ca.key 2048
            
            openssl req -x509 -new -nodes -key ca.key -sha256 -days 365 -out ca.crt -subj "/CN=ValkeyCA"

            echo "Generate server key"

            openssl genrsa -out tls.key 2048

            echo "Generate certificate signing request"
            
            openssl req -new -key tls.key -out tls.csr -subj "/CN=valkey.${NAMESPACE}.svc.cluster.local"

            echo "Create config file for SAN"

            ( echo "cat <<EOF" ; cat ../templates/template-apic-valkey-tls.conf ;) | \
              NAMESPACE=${NAMESPACE} \
              sh > san.cnf

            echo "Generate the certificate with SAN"

            openssl x509 -req -in tls.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out tls.crt -days 365 -sha256 -extfile san.cnf -extensions v3_req

            # Create the TLS secrete
            
            echo "Creating TLS secret ${SECRET_NAME} in namespace ${NAMESPACE}"
            
            oc create namespace ${NAMESPACE} --dry-run=client -o yaml | oc apply -f -
            
            oc create secret generic ${SECRET_NAME} \
              --from-file=ca.crt=ca.crt \
              --from-file=tls.crt=tls.crt \
              --from-file=tls.key=tls.key \
              -n ${NAMESPACE}

            echo "Secret ${SECRET_NAME} created in namespace ${NAMESPACE}"

            cd ..
            
            rm -r certs

            INST_NAME="valkey"
            
            NS_NAME=$(params.APIC_NAMESPACE)

            echo "Deploying Valkey CRDs..."

            oc apply --server-side -f resources/70a-apic-valkey-crds.yaml

            echo "Preparing YAML file..."

            ( echo "cat <<EOF" ; cat resources/70b-apic-valkey-operator.yaml ;) | \
                NS_NAME=${NS_NAME} \
                sh > apic-valkey-operator.yaml

            echo "Deploying Valkey operator..."

            oc apply --server-side --force-conflicts -f apic-valkey-operator.yaml

            echo "Waiting for Operator to be ready..."

            while ! oc wait --for=jsonpath='{.status.conditions[0].status}'=True \
                  deployment/valkey-operator -n $NS_NAME 2>/dev/null; do 
              sleep 5
            done

            echo "Defining Valkey Admin password..."

            if [[ -z "$(oc get secret valkey-secret -n ${NS_NAME} --no-headers --ignore-not-found=true)" ]]; then
              oc create secret generic valkey-secret -n $NS_NAME --from-literal=username=default --from-literal=password=admin
            else
              echo "Valkey valkey-secret already exists in namespace $NS_NAME"
            fi

            echo "Deploying Valkey instance..."

            oc apply -f resources/70c-apic-valkey-standalone-cr.yaml -n $NS_NAME

            echo "Cleaning up temp file..."
            
            rm -f apic-valkey-operator.yaml

            echo "Waiting for Valkey instance to be ready..."

            while ! oc wait --for=condition=Ready
            pod/${INST_NAME}-0 -n
            $NS_NAME  2>/dev/null; do sleep 20; done

            echo "Valkey instance is ready"
        - name: VERSION
          value: latest
