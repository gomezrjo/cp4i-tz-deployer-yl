              else
                echo "Validating If User Exists..."
                USER_URL=$(jq -r --arg obj_name $USER_NAME '.results[] | select(.name == $obj_name) | .url' apic-response-data.json)
                if [ -z "$USER_URL" ]; then
                  echo "Generating user password..."
                  USER_PWD=$(uuidgen | tr '[:upper:]' '[:lower:]' | tr -d '-');
                  echo "Creating User Definition..."
                  ( echo "cat <<EOF" ; cat templates/template-apic-user.json ;) | \
                    USER_NAME=${USER_NAME} \
                    USER_EMAIL=${USER_EMAIL} \
                    USER_FNAME=${USER_FNAME} \
                    USER_LNAME=${USER_LNAME} \
                    USER_PWD=${USER_PWD} \
                    sh > apic-user.json
                  RESP_CODE=$(curl -X POST -s -k \
                    --dump-header apic-api-header \
                    -H 'Accept: application/json' \
                    -H 'Content-Type: application/json' \
                    -H "Authorization: Bearer $API_TOKEN" \
                    --data @apic-user.json \
                    --output apic-response-data.json \
                    --write-out '%{response_code}' \
                    $APIC_MGMT_SERVER_URL/api/user-registries/admin/api-manager-lur/users)
                  if [[ "${RESP_CODE}" != "201" ]]; then
                    if [[ "${RESP_CODE}" == "401" ]]; then
                      echo "APIC Credentials are not valid. Check the values and correct them."
                    else
                      echo "There is a problem accessing API Manager. Response code $RESP_CODE"
                      echo "Check API Manager is up and running and properly configured."
                    fi
                  else
                    echo "User $USER_NAME has been created."
                    USER_URL=$(jq -r '.url' apic-response-data.json)
                    CONFIG_DATA=$(oc get secret porg-lur-users-info -n $NS_NAME --ignore-not-found -o jsonpath='{.data.porg-lur-users-config\.json}')
