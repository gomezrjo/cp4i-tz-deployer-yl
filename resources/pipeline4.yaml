    - name: dp-nanogateway-operator-installation
      params:
        - name: SCRIPT
          value: >-
            set -o xtrace

            NS_NAME=$(params.APIC_NAMESPACE)

            cd workspace/cp4i-ws/cp4i-deployer-helper

            echo "Getting OCP Version..."

            oc version -o json > ocp_info.json
            
            TMP_STR=$(jq -r '.openshiftVersion' ocp_info.json)
            
            OCP_CURR_VER="${TMP_STR%.*}"
            
            OCP_MIN_VER="4.18"

            if awk -v n1="$OCP_CURR_VER" -v n2="$OCP_MIN_VER" 'BEGIN {exit !(n1 > n2)}'; then
              echo "OCP is at the right version, the API Gateway is already available..."
            else
              echo "Installing the API Gateway..."
              oc apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
            fi

            rm -f ocp_info.json

            echo "Deploying Nano Gateway CRDs..."
            
            oc apply -f resources/70d-apic-nano-gwy-crds.yaml

            echo "Preparing YAML file..."

            ( echo "cat <<EOF" ; cat resources/70e-apic-nano-gwy-operator.yaml ;) | \
                NS_NAME=${NS_NAME} \
                sh > apic-nano-gwy-operator.yaml

            echo "Deploying Nano Gateway operator..."

            oc apply -f apic-nano-gwy-operator.yaml

            echo "Waiting for Operator to be ready..."

            while ! oc wait --for=jsonpath='{.status.conditions[0].status}'=True \
                  deployment/datapower-nano-operator -n $NS_NAME 2>/dev/null; do 
              sleep 5
            done

            echo "Enabling WildCards for Routes..."

            oc patch ingresscontroller default -n openshift-ingress-operator --type=merge -p '{"spec":{"routeAdmission":{"wildcardPolicy":"WildcardsAllowed"}}}'

            echo "Cleaning up temp file..."

            rm -f apic-nano-gwy-operator.yaml

            echo "Nano Gateway operator is Ready..."
